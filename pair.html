<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 QUEEN MIA MD 👑</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --rgb-speed: 16s;
    --glass-bg: rgba(0, 0, 0, 0.85);
    --border-glow: rgba(255, 255, 255, 0.08);
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    background: #0a0a0f;
    color: #fff;
    padding: 20px;
    background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(120, 80, 255, 0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(255, 80, 120, 0.05) 0%, transparent 60%);
}

.card {
    width: 90%;
    max-width: 420px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: 32px 24px 28px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 
        0 30px 80px rgba(0, 0, 0, 0.8),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    transition: all 0.3s;
}

@keyframes rgbText {
    0% { background-position: 0% 50%; }
    100% { background-position: 400% 50%; }
}

.rgb-text {
    background: linear-gradient(90deg, 
        #ff4d6d, #ff8a4d, #ffd93d, #6bcb77, #4d96ff, #9b59ff, #ff4d6d
    );
    background-size: 400% 100%;
    animation: rgbText var(--rgb-speed) linear infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 2px;
}

h1:last-of-type {
    font-size: 1.6rem;
    margin-bottom: 4px;
}

.status {
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.8;
    margin: 6px 0 16px 0;
    font-weight: 500;
}

.rgb-box {
    padding: 3px;
    border-radius: 18px;
    background: linear-gradient(90deg, #ff4d6d, #ff8a4d, #ffd93d, #6bcb77, #4d96ff, #9b59ff, #ff4d6d);
    background-size: 300% 100%;
    animation: rgbMove 4s linear infinite;
    width: 100%;
    max-width: 340px;
    margin: 0 auto 16px auto;
    transition: all 0.3s;
    box-shadow: 0 0 30px rgba(155, 89, 255, 0.05);
}

.rgb-box input {
    width: 100%;
    border: none;
    outline: none;
    padding: 16px;
    border-radius: 16px;
    background: #0a0a0f;
    color: #fff;
    text-align: center;
    font-size: 1.05rem;
    font-family: 'Poppins', sans-serif;
}

.rgb-box input::placeholder {
    color: #555;
}

.rgb-btn {
    width: 100%;
    max-width: 340px;
    padding: 3px;
    border-radius: 18px;
    background: linear-gradient(90deg, #ff4d6d, #ff8a4d, #ffd93d, #6bcb77, #4d96ff, #9b59ff, #ff4d6d);
    background-size: 300% 100%;
    animation: rgbMove 4s linear infinite;
    border: none;
    cursor: pointer;
    display: block;
    margin: 0 auto;
    transition: all 0.3s;
}

.btn-inner {
    background: #0a0a0f;
    color: #fff;
    display: block;
    padding: 14px;
    border-radius: 16px;
    font-weight: 700;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s;
}

.rgb-btn:hover:not(:disabled) {
    transform: scale(1.02);
    box-shadow: 0 10px 40px rgba(155, 89, 255, 0.2);
}

.rgb-btn:hover:not(:disabled) .btn-inner {
    background: #111118;
}

.rgb-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

@keyframes rgbMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
}

.result-box {
    width: 100%;
    max-width: 340px;
    margin: 16px auto 0;
    padding: 3px;
    border-radius: 18px;
    background: linear-gradient(90deg, #ff4d6d, #ff8a4d, #ffd93d, #6bcb77, #4d96ff, #9b59ff, #ff4d6d);
    background-size: 300% 100%;
    animation: rgbMove 5s linear infinite;
    display: none;
    box-shadow: 0 0 40px rgba(155, 89, 255, 0.05);
}

.result-inner {
    background: #0a0a0f;
    border-radius: 16px;
    padding: 16px;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 600;
    text-align: center;
    word-break: break-all;
}

#codeBox {
    letter-spacing: 4px;
    color: #fff;
    cursor: default;
}

.loader {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top: 3px solid #9b59ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.status-info {
    margin-top: 16px;
    padding: 12px;
    border-radius: 12px;
    background: rgba(155, 89, 255, 0.1);
    border: 1px solid rgba(155, 89, 255, 0.2);
    font-size: 0.8rem;
    line-height: 1.5;
    display: none;
}

.status-info.show {
    display: block;
}

.status-info.success {
    background: rgba(107, 203, 119, 0.1);
    border-color: rgba(107, 203, 119, 0.2);
    color: #6bcb77;
}

.status-info.error {
    background: rgba(255, 77, 109, 0.1);
    border-color: rgba(255, 77, 109, 0.2);
    color: #ff4d6d;
}

.status-info.warning {
    background: rgba(255, 166, 61, 0.1);
    border-color: rgba(255, 166, 61, 0.2);
    color: #ffa63d;
}

.badge-group {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
}

.badge {
    padding: 4px 14px;
    border-radius: 30px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    font-size: 0.6rem;
    letter-spacing: 0.5px;
    color: #888;
    font-weight: 500;
}

footer {
    margin-top: 16px;
    font-size: 0.7rem;
    color: #444;
    letter-spacing: 0.5px;
    border-top: 1px solid rgba(255, 255, 255, 0.04);
    padding-top: 12px;
}

@media (max-width: 480px) {
    .card { padding: 24px 16px; }
    h1 { font-size: 1.7rem; }
    h1:last-of-type { font-size: 1.4rem; }
    .result-inner { font-size: 0.95rem; }
}
</style>
</head>
<body>

<div class="card">

<h1 class="rgb-text">👑 QUEEN MIA MD 👑</h1>
<h1 class="rgb-text">PAIR CODE</h1>

<p class="status rgb-text">ENTER YOUR WHATSAPP NUMBER</p>

<div class="rgb-box">
    <input type="text" id="number" placeholder="263777237953" maxlength="15">
</div>

<button class="rgb-btn" id="pairBtn" onclick="getCode()">
    <span class="btn-inner">GET PAIR CODE</span>
</button>

<div class="status-info" id="statusInfo"></div>

<div class="result-box" id="borderBox">
    <div class="result-inner" id="codeBox">----</div>
</div>

<div class="badge-group">
    <span class="badge">🤖 WHATSAPP BOT</span>
    <span class="badge">⚡ QUEEN MIA MD</span>
    <span class="badge">✨ 2026</span>
</div>

<p class="status rgb-text" style="margin-top: 10px; font-size: 0.6rem;">MADE BY QUEEN MIA MD · MINI BOT EDITION</p>

</div>

<script>
const MAX_CONCURRENT = 5;
const QUEUE_TIMEOUT = 300000; // 5 minutes
let activeConnections = 0;
let requestQueue = [];
let lastRequestTime = {};

function showStatus(message, type = 'info') {
    const statusInfo = document.getElementById('statusInfo');
    statusInfo.innerHTML = message;
    statusInfo.className = `status-info show ${type}`;
}

function hideStatus() {
    const statusInfo = document.getElementById('statusInfo');
    statusInfo.className = 'status-info';
}

async function processQueue() {
    if (activeConnections >= MAX_CONCURRENT || requestQueue.length === 0) return;
    
    const request = requestQueue.shift();
    activeConnections++;
    
    try {
        const res = await fetch(`/code?number=${request.number}`, {
            timeout: 30000
        });
        const data = await res.json();
        
        const codeBox = document.getElementById("codeBox");
        const borderBox = document.getElementById("borderBox");
        
        if (data.code) {
            codeBox.style.letterSpacing = "4px";
            codeBox.style.color = "#fff";
            codeBox.innerText = data.code;
            showStatus(`✅ Code generated successfully! Copy it now.`, 'success');
        } else if (data.status === 'already_connected') {
            codeBox.style.color = "#ffa63d";
            codeBox.innerText = "NUMBER ALREADY CONNECTED";
            showStatus(`⚠️ This number is already connected. Please use a different number.`, 'warning');
        } else {
            codeBox.style.color = "#ff4d6d";
            codeBox.innerText = "CONNECTION FAILED";
            showStatus(`❌ ${data.error || 'Failed to get pairing code'}`);
        }
        borderBox.style.display = "block";
    } catch (error) {
        console.error('Error:', error);
        const codeBox = document.getElementById("codeBox");
        const borderBox = document.getElementById("borderBox");
        codeBox.style.color = "#ff4d6d";
        codeBox.innerText = "REQUEST TIMEOUT";
        borderBox.style.display = "block";
        showStatus(`❌ Request timeout. The server might be busy. Please try again.`, 'error');
    } finally {
        activeConnections--;
        processQueue();
    }
}

async function getCode() {
    const num = document.getElementById("number").value.replace(/[^0-9]/g, '');
    const pairBtn = document.getElementById("pairBtn");
    const codeBox = document.getElementById("codeBox");
    const borderBox = document.getElementById("borderBox");
    
    if (!num) {
        borderBox.style.display = "block";
        codeBox.style.letterSpacing = "normal";
        codeBox.style.color = "#ff4d6d";
        codeBox.innerText = "PLEASE ENTER YOUR NUMBER";
        showStatus(`❌ WhatsApp number is required`, 'error');
        return;
    }

    if (num.length < 10) {
        borderBox.style.display = "block";
        codeBox.style.letterSpacing = "normal";
        codeBox.style.color = "#ff4d6d";
        codeBox.innerText = "INVALID NUMBER";
        showStatus(`❌ Please enter a valid WhatsApp number`, 'error');
        return;
    }

    // Rate limiting - prevent spam from same number
    const now = Date.now();
    if (lastRequestTime[num] && now - lastRequestTime[num] < 5000) {
        showStatus(`⏱️ Please wait 5 seconds before trying again`, 'warning');
        return;
    }
    lastRequestTime[num] = now;

    // Disable button and show loading
    pairBtn.disabled = true;
    borderBox.style.display = "block";
    codeBox.style.letterSpacing = "normal";
    codeBox.style.color = "#9b59ff";
    codeBox.innerHTML = '<div class="loader"></div> CONNECTING...';
    
    showStatus(`⏳ Your request is being processed. Queue position: ${requestQueue.length + 1}`, 'info');

    requestQueue.push({ number: num });
    processQueue();

    // Re-enable button after 30 seconds
    setTimeout(() => {
        pairBtn.disabled = false;
    }, 30000);
}

document.getElementById("number").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        if (!document.getElementById("pairBtn").disabled) {
            getCode();
        }
    }
});

// Cleanup old request times every 5 minutes
setInterval(() => {
    const now = Date.now();
    for (const num in lastRequestTime) {
        if (now - lastRequestTime[num] > QUEUE_TIMEOUT) {
            delete lastRequestTime[num];
        }
    }
}, 300000);
</script>

</body>
</html>
